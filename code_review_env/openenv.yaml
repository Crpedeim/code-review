name: code-review-env
description: >
  AI Code Review environment that tests an LLM agent's ability to review Python
  code for style issues, logical bugs, and security vulnerabilities. Replicates
  the technical core of AI code review tools like CodeRabbit.
version: "0.1.0"
author: "Garvit"

environment:
  class: server.code_review_environment.CodeReviewEnvironment
  action_model: models.ReviewAction
  observation_model: models.ReviewObservation
  state_model: models.ReviewState

tasks:
  - name: style_review
    description: "Find style, naming, and PEP 8 violations in Python code"
    difficulty: easy
  - name: bug_hunt
    description: "Find logical bugs (off-by-one, missing edge cases, incorrect logic)"
    difficulty: medium
  - name: security_audit
    description: "Identify security vulnerabilities in a Flask web application"
    difficulty: hard

tags:
  - openenv
  - code-review
  - security
  - python
